<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linko Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🔗 Linko Pro</h1>
        <div class="input-stack">
            <input type="text" id="longUrl" placeholder="Paste URL here">
            <input type="text" id="customAlias" placeholder="Custom name (optional)">
            <label><input type="checkbox" id="expires"> Expire in 24h</label>
            <button onclick="shorten()">Shorten</button>
        </div>
        <div id="newResult"></div>
    </div>
    <div id="stats-section">
        <h3>Analytics</h3>
        <div id="linkList"></div>
    </div>
    <script>
        async function shorten() {
            const res = await fetch('/shorten', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    longUrl: document.getElementById('longUrl').value, 
                    customAlias: document.getElementById('customAlias').value, 
                    expires: document.getElementById('expires').checked 
                })
            });
            const data = await res.json();
            if(data.error) return alert(data.error);
            document.getElementById('newResult').innerHTML = `<div class="success-box"><a href="${data.shortUrl}" target="_blank">${data.shortUrl}</a><br><img src="${data.qrCode}" width="100"></div>`;
            fetchLinks();
        }
        async function fetchLinks() {
            const res = await fetch('/api/links');
            const links = await res.json();
            document.getElementById('linkList').innerHTML = links.map(l => `
                <div class="link-card">
                    <img src="${l.qrCode}" class="mini-qr">
                    <div class="link-info">
                        <strong>/${l.short_code}</strong>
                        <small>Clicks: ${l.clicks} | Last: ${l.last_clicked || 'Never'}</small>
                    </div>
                    <button onclick="deleteLink('${l.short_code}')">🗑️</button>
                </div>`).join('');
        }
        async function deleteLink(c) { await fetch(`/api/links/${c}`, {method:'DELETE'}); fetchLinks(); }
        window.onload = fetchLinks;
    </script>
</body>
</html>
